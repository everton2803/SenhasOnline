services:
  database:
    build:
      context: ./database
    container_name: projeto-aplicado-db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_database
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - projeto-aplicado-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_database"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: projeto-aplicado-backend
    env_file:
      - ./backend/.env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - projeto-aplicado-net

  frontend:
    build:
      context: ./frontend
    container_name: projeto-aplicado-frontend
    networks:
      - projeto-aplicado-net

  nginx:
    build:
      context: ./nginx
    container_name: projeto-aplicado-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    networks:
      - projeto-aplicado-net

volumes:
  pgdata:

networks:
  projeto-aplicado-net:
    driver: bridge